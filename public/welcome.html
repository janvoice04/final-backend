<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>welcome <span id="name"></span></h1>
    <script>
       
       
        fetch("http://localhost:3600/users",{
            headers:{
                token:window.localStorage.getItem("token")
            }
        }).then(res=>res.json()).then(data=>{
            if(data.msg==="login please"){window.location.href="loginform.html"}
            else{
                if(data.role=="admin")
                document.getElementById("name").innerHTML=`<b>ADMIN,${data.username}</b>`
            else{
                document.getElementById("name").innerHTML=`<b>User,${data.username}</b>`
            }
            }
            
        })
       
    </script>
</body>
</html>
